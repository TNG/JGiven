buildscript {
    repositories {
        mavenLocal()
        mavenCentral()
    }
    dependencies {
        classpath "com.tngtech.jgiven:jgiven-gradle-plugin:${version}"
    }
}

plugins {
    id "org.jetbrains.kotlin.jvm" version "2.3.20"
}

apply plugin: 'java'
apply plugin: 'idea'
apply plugin: 'eclipse'
apply plugin: 'com.tngtech.jgiven.gradle-plugin'

compileJava {
    sourceCompatibility = JavaVersion.VERSION_17
    targetCompatibility = JavaVersion.VERSION_17
    options.compilerArgs += '-parameters'
    options.encoding = 'UTF-8'
}

ext {
    jgivenVersion = version
}

repositories {
    mavenLocal()
    mavenCentral()
 }

dependencies {
    testImplementation 'org.junit.jupiter:junit-jupiter-api:6.0.3'
    testImplementation 'org.junit.jupiter:junit-jupiter-engine:6.0.3'
    testImplementation 'org.junit.jupiter:junit-jupiter-params:6.0.3'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher:6.0.3'
    testImplementation "com.tngtech.jgiven:jgiven-junit5:${jgivenVersion}"
    testImplementation "com.tngtech.jgiven:jgiven-html5-report:${jgivenVersion}"
}

test {
    useJUnitPlatform()
    finalizedBy(jgivenTestReport)
}
